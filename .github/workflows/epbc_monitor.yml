name: EPBC Referrals Monitor

on:
  schedule:
    - cron: '0 22 * * 0-4'  # 8am AEST (UTC+10) Mon-Fri
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev \
            libpoppler-cpp-dev \
            libuv1-dev \
            libjpeg-dev \
            default-jdk

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Configure Java for R
        run: sudo R CMD javareconf

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.3.0-v2
          restore-keys: |
            ${{ runner.os }}-r-4.3.0-

      - name: Install R packages
        run: |
          Rscript -e "
            install.packages(c(
              'chromote',
              'rvest',
              'dplyr',
              'stringr',
              'pdftools',
              'httr'
            ), repos = 'https://cloud.r-project.org')
            install.packages('tabulapdf', repos = c('https://ropensci.r-universe.dev', 'https://cloud.r-project.org'))
          "

      - name: Run EPBC monitoring
        run: Rscript epbc_monitor.R
        env:
          CHROMOTE_CHROME_PATH: /usr/bin/google-chrome-stable
          DISPLAY: ':99'

      - name: Commit results back to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed_referrals.csv output/new_epbc_referrals.txt
          git diff --staged --quiet || git commit -m "EPBC monitor run: $(date +'%Y-%m-%d')"
          git push
