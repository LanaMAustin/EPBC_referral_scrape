name: EPBC Referrals Monitor

on:
  schedule:
    # Runs at 8:00 AM AEST (UTC+10) Mon-Fri
    # GitHub Actions uses UTC, so 8am AEST = 10pm UTC previous day
    - cron: '0 22 * * 0-4'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libpng-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpoppler-cpp-dev \
            default-jdk \
            r-cran-rjava
          sudo R CMD javareconf

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}-v1
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R packages
        run: |
          Rscript -e "
            install.packages(c(
              'chromote',
              'rvest',
              'dplyr',
              'stringr',
              'pdftools',
              'httr',
              'knitr',
              'kableExtra',
              'htmltools'
            ), repos = 'https://cloud.r-project.org')
            install.packages('tabulapdf', repos = c('https://ropensci.r-universe.dev', 'https://cloud.r-project.org'))
          "

      - name: Run EPBC monitoring
        run: Rscript epbc_monitor.R
        env:
          CHROMOTE_CHROME_PATH: /usr/bin/google-chrome-stable
          DISPLAY: ':99'

      - name: Commit results back to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/processed_referrals.csv output/new_epbc_referrals.html
          git diff --staged --quiet || git commit -m "EPBC monitor run: $(date +'%Y-%m-%d')"
          git push
